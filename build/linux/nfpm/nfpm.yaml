# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "formidable"
arch: ${GOARCH}
platform: "linux"
version: "3.0.0"
section: "default"
priority: "extra"
maintainer: ${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>
description: "Editor for templates and Markdown forms"
vendor: "Peter van de Pas"
homepage: "https://wails.io"
license: "MIT"
release: "1"

contents:
  # All install paths use the same PascalCase as APP_NAME so they line
  # up with what Wails actually emits (bin/Formidable,
  # build/linux/Formidable.desktop) and with the Wails-generated
  # .desktop's Exec=Formidable / Icon=Formidable. No rename steps,
  # no case-sensitivity surprises on the Linux packaging path.
  - src: "./bin/Formidable"
    dst: "/usr/local/bin/Formidable"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/Formidable.png"
  - src: "./build/linux/Formidable.desktop"
    dst: "/usr/share/applications/Formidable.desktop"

# Default dependencies for Debian 12/Ubuntu 22.04+ with WebKit 4.1
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

# Distribution-specific overrides for different package formats and WebKit versions
overrides:
  # RPM packages for RHEL/CentOS/AlmaLinux/Rocky Linux (WebKit 4.0)
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
  
  # Arch Linux packages (WebKit 4.1)  
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  # You can also add preremove, postremove if needed
  # preremove: "./build/linux/nfpm/scripts/preremove.sh"
  # postremove: "./build/linux/nfpm/scripts/postremove.sh"

