name: Release Formidable

# Push a v* tag (e.g. `git tag v0.2.0 && git push --tags`) to fire a
# full release pipeline: tests gate, then per-platform builds, then a
# single GitHub Release with all artifacts attached. The tag value
# minus the leading "v" becomes the binary's about.Version (injected
# via -ldflags) and the Windows installer's internal DisplayVersion.
# Artifact filenames are version-free — the release tag is the only
# version disambiguator (and is shown by GitHub on the release page).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "20"
  WAILS_VERSION: "v3.0.0-alpha.84"
  # Path of the Version var ldflags targets. Keeping it here so any
  # rename of internal/modules/about lands in exactly one place.
  VERSION_PATH: "github.com/petervdpas/formidable2/internal/modules/about.Version"

jobs:
  # ───────────────────────────────────────────────────────────────
  # Run tests before building anything. Every build job needs: [test]
  # so a red suite never produces a release.
  # ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            build-essential pkg-config

      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: |
          echo '## Test Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  # ───────────────────────────────────────────────────────────────
  # Windows: native build + NSIS installer + portable zip.
  # Wails 3's NSIS template already produces a version-free filename
  # (Formidable-amd64-installer.exe) thanks to the INFO_PROJECTNAME
  # override in build/windows/nsis/project.nsi. We pass the real
  # version as INFO_PRODUCTVERSION so Windows Programs list and
  # upgrade detection have the right value.
  # ───────────────────────────────────────────────────────────────
  windows:
    name: Windows
    needs: [test]
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = "${{ github.ref_name }}" -replace '^v',''
          } else {
            $ver = "dev-${{ github.sha }}".Substring(0, 14)
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails 3 CLI
        shell: pwsh
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco updates PATH for *future* shells; this job's later steps
          # don't inherit it. Append the install dir to GITHUB_PATH so the
          # `makensis` call in the installer step resolves.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build frontend
        shell: pwsh
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Regenerate Wails bindings
        shell: pwsh
        run: wails3 generate bindings -clean -ts

      - name: Patch version into Windows resource files
        # PE resources (file_version, ProductVersion, manifest assemblyIdentity)
        # are baked at .syso compile time and don't pick up the ldflags
        # injection used for about.Version. Rewrite them from the tag so the
        # binary's Properties dialog and uninstaller registry entry match
        # the release. Non-numeric VERSION (dev builds, workflow_dispatch)
        # falls back to 0.0.0 since PE FixedFileInfo requires numeric.
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          if ($ver -match '^\d+(\.\d+)*$') {
            $parts = $ver -split '\.'
          } else {
            $parts = @('0','0','0')
          }
          while ($parts.Count -lt 3) { $parts += '0' }
          $ver3 = ($parts[0..2]) -join '.'
          $ver4 = "$ver3.0"

          $infoPath = "build/windows/info.json"
          $info = Get-Content $infoPath -Raw | ConvertFrom-Json
          $info.fixed.file_version = $ver3
          $info.info.'0000'.ProductVersion = $ver3
          $info | ConvertTo-Json -Depth 10 | Set-Content $infoPath -NoNewline

          $manifestPath = "build/windows/wails.exe.manifest"
          $manifest = Get-Content $manifestPath -Raw
          $manifest = $manifest -replace '(name="eu\.mnemonics\.formidable"\s+version=)"[^"]*"', ('$1"' + $ver4 + '"')
          Set-Content $manifestPath -Value $manifest -NoNewline

          Write-Host "Patched PE versions: file/ProductVersion=$ver3, manifest=$ver4"

      - name: Generate Windows resource file (.syso)
        shell: pwsh
        run: |
          cd build
          wails3 generate syso -arch amd64 -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_amd64.syso

      - name: Build binary
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -tags production -trimpath -buildvcs=false `
            -ldflags="-buildid= -H windowsgui -X ${env:VERSION_PATH}=$ver" `
            -o bin/Formidable.exe .
          Remove-Item *.syso

      - name: Generate WebView2 bootstrapper
        shell: pwsh
        run: wails3 generate webview2bootstrapper -dir build/windows/nsis

      - name: Build NSIS installer
        shell: pwsh
        run: |
          cd build/windows/nsis
          $ver = "${{ steps.version.outputs.VERSION }}"
          # INFO_PRODUCTVERSION takes 4-part dotted, so pad if the tag
          # is shorter (e.g. "1.2" → "1.2.0"). NSIS appends ".0" anyway
          # to make the FILEVERSION resource happy.
          $padded = $ver
          $parts = $padded -split '\.'
          while ($parts.Count -lt 3) { $parts += '0' }
          $padded = ($parts[0..2]) -join '.'
          makensis "/DINFO_PRODUCTVERSION=$padded" `
            "/DARG_WAILS_AMD64_BINARY=..\..\..\bin\Formidable.exe" `
            project.nsi

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "bin/Formidable-amd64-installer.exe" "dist/Formidable-windows-amd64-installer.exe"
          Compress-Archive -Path "bin/Formidable.exe" -DestinationPath "dist/Formidable-windows-amd64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # Debian / Ubuntu amd64 — portable tar.gz + .deb.
  # Built natively on ubuntu-24.04, which ships WebKit2GTK 4.1 so the
  # binary's ABI matches what the .deb declares as runtime depends.
  # ───────────────────────────────────────────────────────────────
  linux_debian:
    name: Linux Debian (amd64)
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            build-essential pkg-config

      - name: Install Wails 3 CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Regenerate Wails bindings
        run: wails3 generate bindings -clean -ts

      - name: Generate .desktop
        run: wails3 generate .desktop -name "Formidable" -exec "Formidable" -icon "Formidable" -outputfile "build/linux/Formidable.desktop" -categories "Utility;"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          mkdir -p bin
          VERSION="${{ steps.version.outputs.VERSION }}"
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-buildid= -X ${VERSION_PATH}=${VERSION}" \
            -o bin/Formidable .

      - name: Patch nfpm version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.version.outputs.VERSION }}\"/" build/linux/nfpm/nfpm.yaml

      - name: Build .deb
        env:
          GOARCH: amd64
        run: wails3 tool package -name "Formidable" -format deb -config ./build/linux/nfpm/nfpm.yaml -out bin

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # Portable tarball — version-free filename.
          STAGE="$(mktemp -d)/Formidable-linux-amd64"
          mkdir -p "$STAGE"
          cp bin/Formidable "$STAGE/"
          cp build/appicon.png "$STAGE/Formidable.png"
          [ -f README.md ] && cp README.md "$STAGE/"
          tar -C "$(dirname "$STAGE")" -czf dist/Formidable-linux-amd64.tar.gz "$(basename "$STAGE")"
          # .deb — rename the versioned nfpm output to a version-free name.
          # Match by extension to avoid casing surprises (wails3 -name "Formidable"
          # produces Formidable_*.deb, nfpm yaml's lowercase produces formidable_*.deb).
          mv bin/*.deb dist/Formidable-linux-amd64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-debian
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # Raspberry Pi / ARM64 — portable tar.gz + .deb.
  # ubuntu-24.04-arm is a real ARM64 runner so we cross-compile in
  # zero hops. Same WebKit 4.1 ABI as the amd64 Debian path.
  # ───────────────────────────────────────────────────────────────
  linux_raspi:
    name: Linux Raspberry Pi (arm64)
    needs: [test]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            build-essential pkg-config

      - name: Install Wails 3 CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Regenerate Wails bindings
        run: wails3 generate bindings -clean -ts

      - name: Generate .desktop
        run: wails3 generate .desktop -name "Formidable" -exec "Formidable" -icon "Formidable" -outputfile "build/linux/Formidable.desktop" -categories "Utility;"

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          mkdir -p bin
          VERSION="${{ steps.version.outputs.VERSION }}"
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-buildid= -X ${VERSION_PATH}=${VERSION}" \
            -o bin/Formidable .

      - name: Patch nfpm version
        run: |
          sed -i "s/^version:.*/version: \"${{ steps.version.outputs.VERSION }}\"/" build/linux/nfpm/nfpm.yaml

      - name: Build .deb
        env:
          GOARCH: arm64
        run: wails3 tool package -name "Formidable" -format deb -config ./build/linux/nfpm/nfpm.yaml -out bin

      - name: Collect artifacts
        run: |
          mkdir -p dist
          STAGE="$(mktemp -d)/Formidable-linux-arm64"
          mkdir -p "$STAGE"
          cp bin/Formidable "$STAGE/"
          cp build/appicon.png "$STAGE/Formidable.png"
          [ -f README.md ] && cp README.md "$STAGE/"
          tar -C "$(dirname "$STAGE")" -czf dist/Formidable-linux-arm64.tar.gz "$(basename "$STAGE")"
          mv bin/*.deb dist/Formidable-linux-arm64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-raspi
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # Fedora 43 RPM — built inside fedora:43 container because RPM
  # depends on the host's RPM database / library SONames, which on
  # ubuntu-24.04 won't match Fedora's layout.
  # ───────────────────────────────────────────────────────────────
  linux_fedora43:
    name: Linux Fedora 43
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build inside fedora:43
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cat > "$RUNNER_TEMP/build.sh" <<'BUILDEOF'
          set -euo pipefail

          dnf -y update
          dnf -y install \
            bash ca-certificates curl git \
            gcc gcc-c++ make pkgconf-pkg-config \
            gtk3-devel webkit2gtk4.1-devel libayatana-appindicator-gtk3-devel \
            tar gzip rpm-build

          curl -fsSL "https://rpm.nodesource.com/setup_${NODE_VERSION}.x" | bash -
          dnf -y install nodejs

          curl -fsSL "https://go.dev/dl/go${GO_RELEASE}.linux-amd64.tar.gz" -o /tmp/go.tgz
          rm -rf /usr/local/go
          tar -C /usr/local -xzf /tmp/go.tgz
          export PATH="/usr/local/go/bin:${PATH}"

          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"
          export PATH="$(go env GOPATH)/bin:${PATH}"

          cd /src

          (cd frontend && npm ci && npm run build)
          wails3 generate bindings -clean -ts
          wails3 generate .desktop -name "Formidable" -exec "Formidable" -icon "Formidable" -outputfile "build/linux/Formidable.desktop" -categories "Utility;"

          mkdir -p bin
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 \
            go build -tags production -trimpath -buildvcs=false \
              -ldflags="-buildid= -X ${VERSION_PATH}=${VERSION}" \
              -o bin/Formidable .

          sed -i "s/^version:.*/version: \"${VERSION}\"/" build/linux/nfpm/nfpm.yaml
          GOARCH=amd64 wails3 tool package -name "Formidable" -format rpm -config ./build/linux/nfpm/nfpm.yaml -out bin

          mkdir -p dist
          mv bin/*.rpm dist/Formidable-linux-amd64.rpm
          BUILDEOF

          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -v "$RUNNER_TEMP/build.sh:/tmp/build.sh:ro" \
            -w /src \
            -e "VERSION=${VERSION}" \
            -e "VERSION_PATH=${VERSION_PATH}" \
            -e "NODE_VERSION=${NODE_VERSION}" \
            -e "WAILS_VERSION=${WAILS_VERSION}" \
            -e "GO_RELEASE=1.25.0" \
            fedora:43 bash /tmp/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-fedora43
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # macOS — universal .app bundle wrapped in a drag-to-Applications
  # .dmg. Built natively on macos-14 (Apple Silicon) which has both
  # lipo and hdiutil available. The .app is ad-hoc signed only
  # (codesign --sign -); on download users get a Gatekeeper warning
  # and must right-click → Open the first time, or run
  # `xattr -d com.apple.quarantine` on the .app. To upgrade to
  # Developer ID signing + notarization, set SIGN_IDENTITY and
  # KEYCHAIN_PROFILE in build/darwin/Taskfile.yml.
  # ───────────────────────────────────────────────────────────────
  macos:
    name: macOS (universal)
    needs: [test]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails 3 CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Regenerate Wails bindings
        run: wails3 generate bindings -clean -ts

      - name: Build universal binary
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CGO_ENABLED: "1"
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          CGO_CFLAGS: "-mmacosx-version-min=12.0"
          CGO_LDFLAGS: "-mmacosx-version-min=12.0"
        run: |
          mkdir -p bin
          GOOS=darwin GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
              -ldflags="-buildid= -X ${VERSION_PATH}=${VERSION}" \
              -o bin/Formidable-amd64 .
          GOOS=darwin GOARCH=arm64 \
            go build -tags production -trimpath -buildvcs=false \
              -ldflags="-buildid= -X ${VERSION_PATH}=${VERSION}" \
              -o bin/Formidable-arm64 .
          lipo -create -output bin/Formidable bin/Formidable-amd64 bin/Formidable-arm64
          rm bin/Formidable-amd64 bin/Formidable-arm64

      - name: Assemble .app bundle
        run: |
          APP="bin/Formidable.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/darwin/icons.icns "$APP/Contents/Resources/"
          if [ -f build/darwin/Assets.car ]; then
            cp build/darwin/Assets.car "$APP/Contents/Resources/"
          fi
          mv bin/Formidable "$APP/Contents/MacOS/"
          cp build/darwin/Info.plist "$APP/Contents/"
          codesign --force --deep --sign - "$APP"

      - name: Free disk before dmg
        run: |
          df -h /
          rm -rf "$(go env GOMODCACHE)" "$(go env GOCACHE)" || true
          df -h /

      - name: Build .dmg
        run: |
          mkdir -p bin/dmg-staging
          mv bin/Formidable.app bin/dmg-staging/
          ln -sf /Applications bin/dmg-staging/Applications
          hdiutil create \
            -volname "Formidable" \
            -srcfolder bin/dmg-staging \
            -ov -format UDZO \
            bin/Formidable-macos-universal.dmg
          rm -rf bin/dmg-staging

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp bin/Formidable-macos-universal.dmg dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # Aggregate every build's artifacts into one GitHub Release.
  # ───────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [windows, linux_debian, linux_raspi, linux_fedora43, macos]
    # Only auto-publish on actual tag pushes — workflow_dispatch runs
    # exercise the build matrix without making a release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 8 -type f -exec cp -v "{}" dist/ \;
          echo "--- Release assets ---"
          ls -la dist

      - name: Generate SHA256 checksums
        # One Formidable-${{ tag }}-SHA256SUMS.txt file lists every other
        # artifact's hash so downloaders can verify integrity. Reputation
        # systems (and humans) prefer checksum-verifiable downloads.
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          # Hash everything except the checksum file itself if it exists.
          rm -f Formidable-*-SHA256SUMS.txt
          sha256sum * | sort > "Formidable-${{ github.ref_name }}-SHA256SUMS.txt"
          echo "--- Checksums ---"
          cat "Formidable-${{ github.ref_name }}-SHA256SUMS.txt"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Formidable ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
