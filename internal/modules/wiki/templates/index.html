<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { border-bottom: 1px solid #ddd; padding-bottom: .3em; }
    ul.template-list { list-style: none; padding: 0; }
    ul.template-list li { padding: .4em 0; border-bottom: 1px solid #eee; }
    ul.template-list a { text-decoration: none; color: #0366d6; font-weight: 500; }
    ul.template-list .stem { color: #888; font-size: .85em; margin-left: .5em; }
    .empty { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>{{.Title}}</h1>
  {{if .Templates}}
  <ul class="template-list">
    {{range .Templates}}
    <li><a href="{{.Href}}">{{.Name}}</a><span class="stem">{{.Stem}}</span></li>
    {{end}}
  </ul>
  {{else}}
  <p class="empty">No templates yet.</p>
  {{end}}
</body>
</html>
