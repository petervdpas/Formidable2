{{define "title"}}{{.Title}} — Formidable Wiki{{end}}
{{define "meta"}}{}{{end}}
{{define "content"}}
<h1>{{.Title}}</h1>
{{if .Templates}}
<ul class="template-list">
  {{range .Templates}}
  <li class="template-item">
    <a href="{{.Href}}">
      <span class="form-link-title">{{.Name}}</span>
    </a>
  </li>
  {{end}}
</ul>
{{else}}
<p class="muted">No templates yet.</p>
{{end}}
{{end}}
