<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { border-bottom: 1px solid #ddd; padding-bottom: .3em; }
    nav.crumbs a { color: #0366d6; text-decoration: none; }
    ul.form-list { list-style: none; padding: 0; }
    ul.form-list li { padding: .35em 0; border-bottom: 1px solid #eee; }
    ul.form-list a { text-decoration: none; color: #0366d6; }
    ul.form-list .filename { color: #888; font-size: .85em; margin-left: .5em; }
    .empty { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <nav class="crumbs"><a href="{{.BackHref}}">← All templates</a></nav>
  <h1>{{.Name}}</h1>
  {{if .Forms}}
  <ul class="form-list">
    {{range .Forms}}
    <li><a href="{{.Href}}">{{.Title}}</a><span class="filename">{{.Filename}}</span></li>
    {{end}}
  </ul>
  {{else}}
  <p class="empty">No forms in this template yet.</p>
  {{end}}
</body>
</html>
