<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{.Title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 880px; margin: 2em auto; padding: 0 1em; color: #222; }
    nav.crumbs a { color: #0366d6; text-decoration: none; }
    h1.title { border-bottom: 1px solid #ddd; padding-bottom: .3em; }
    article.formidable-prose { margin-top: 1.5em; }
  </style>
</head>
<body>
  <nav class="crumbs"><a href="{{.BackHref}}">← {{.Stem}}</a></nav>
  <h1 class="title">{{.Title}}</h1>
  <article class="formidable-prose">
    {{.Body | safeHTML}}
  </article>
</body>
</html>
