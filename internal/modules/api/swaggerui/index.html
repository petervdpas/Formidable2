<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Formidable Collections API</title>
  <link rel="stylesheet" href="/api/docs/swagger-ui.css" />
  <style>
    body { margin: 0; background: #fff; }
    /* Make the topbar a flex row so swagger-back.js can park its
       link to the right of the swagger logo. Mirrors the original
       Formidable customCss. */
    .swagger-ui .topbar .wrapper {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .swagger-ui .topbar .wrapper a.fm-docs-back {
      all: unset;
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font: 600 12px/1.15 system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif !important;
      padding: .28rem .6rem !important;
      border-radius: 9999px !important;
      border: 1px solid #dbe5ff !important;
      background: #f7faff !important;
      color: #2a62e0 !important;
      text-decoration: none !important;
      cursor: pointer;
    }
    .swagger-ui .topbar .wrapper a.fm-docs-back:hover {
      background: #eff5ff !important;
      border-color: #c9d8ff !important;
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="/api/docs/swagger-ui-bundle.js"></script>
  <script src="/api/docs/swagger-ui-standalone-preset.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      window.ui = SwaggerUIBundle({
        url: "/api/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout"
      });
    });
  </script>
  <script src="/api/docs/swagger-back.js"></script>
</body>
</html>
