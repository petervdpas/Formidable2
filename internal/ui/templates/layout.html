{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="{{.Theme}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<div class="app">
    <header class="topbar">
        <span class="brand">{{.AppName}}</span>
        <nav class="topnav">
            <a class="navitem {{if eq .Active "templates"}}active{{end}}" href="/">Templates</a>
        </nav>
    </header>

    <main>
        {{include .ContentTmpl .}}
    </main>

    <footer class="footer">
        <span class="muted small">{{.AppName}}{{if .AppVersion}} · {{.AppVersion}}{{end}}</span>
    </footer>
</div>
</body>
</html>
{{end}}
