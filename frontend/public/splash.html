<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Formidable</title>
<style>
  :root {
    --bg: #1a1230;
    --fg: #ede9fe;
    --muted: #a5a0c4;
    --accent: #a855f7;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    cursor: default;
  }
  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 24px 32px;
    box-sizing: border-box;
    gap: 40px;
  }
  .logo {
    flex: 0 0 38%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45));
  }
  .text {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }
  .name {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.05;
  }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .version {
    font-size: 14px;
    color: var(--fg);
  }
  .author {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
  .footer {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .footer .dots::after {
    content: "";
    display: inline-block;
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
    100% { content: ""; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="/formidable.svg" alt="" />
    </div>
    <div class="text">
      <div class="name" id="name">Formidable</div>
      <div class="tagline" id="tagline">A System for Templates and Markdown Forms</div>
      <div class="version" id="version">Version 0.0.0</div>
      <div class="author" id="author">by</div>
    </div>
  </div>
  <div class="footer">starting<span class="dots"></span></div>

<script>
  // Splash receives identity via URL query params so it doesn't need
  // the Wails runtime — it stays a flat static page that paints
  // immediately while the SPA boots in the (still hidden) main window.
  (function () {
    var q = new URLSearchParams(window.location.search);
    var n = q.get("n");
    var v = q.get("v");
    var t = q.get("t");
    var a = q.get("a");
    if (n) document.getElementById("name").textContent = n;
    if (t) document.getElementById("tagline").textContent = t;
    if (v) document.getElementById("version").textContent = "Version " + v;
    if (a) document.getElementById("author").textContent = "by " + a;
    document.title = (n || "Formidable");
  })();
</script>
</body>
</html>
